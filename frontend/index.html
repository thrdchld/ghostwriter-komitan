<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GhostWriter Komitan</title>

    <link rel="stylesheet"
          href="/frontend/style.css">
</head>

<body>

<div id="app">

    <aside id="sidebar">

        <div id="logo">
            <h1>GhostWriter</h1>
            <p>Komitan</p>
        </div>

        <nav>

            <button data-page="dashboard">
                Dashboard
            </button>

            <button data-page="chat">
                Chat
            </button>

            <button data-page="writer">
                Writer
            </button>

            <button data-page="brain">
                WritingBrain
            </button>

            <button data-page="models">
                Models
            </button>

            <button data-page="sync">
                Sync
            </button>

            <button data-page="settings">
                Settings
            </button>

        </nav>

    </aside>

    <main id="content">

        <section id="dashboard">

            <h2>Dashboard</h2>

            <p>
                Selamat datang di GhostWriter Komitan.
            </p>

        </section>

        <section id="chat" hidden>

            <h2>Chat</h2>

            <div id="chat-history">
            </div>

            <textarea
                id="chat-input"
                placeholder="Tulis pesan...">
            </textarea>

            <button id="send-chat">
                Kirim
            </button>

        </section>

        <section id="writer" hidden>

            <h2>Writer</h2>

            <input
                type="text"
                id="writer-topic"
                placeholder="Topik">

            <textarea
                id="writer-prompt"
                placeholder="Instruksi">
            </textarea>

            <button id="generate-writer">
                Generate
            </button>

        </section>

        <section id="brain" hidden>

            <h2>WritingBrain</h2>

            <div id="brain-files">
            </div>

        </section>

        <section id="models" hidden>

            <h2>Models</h2>

            <div id="installed-models">
            </div>

            <button id="refresh-models">
                Refresh
            </button>

        </section>

        <section id="sync" hidden>

            <h2>Sync</h2>

            <button id="push-brain">
                Push Brain
            </button>

            <button id="pull-brain">
                Pull Brain
            </button>

        </section>

        <section id="settings" hidden>

            <h2>Settings</h2>

            <div id="settings-content">
            </div>

        </section>

    </main>

</div>

<script src="/frontend/app.js"></script>

</body>
</html>
